name: Playwright Tests - manualCoding
on:
  push:
    branches: [ main ]
    paths:
      - 'manualCoding/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'manualCoding/**'
  
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manualCoding
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: manualCoding/playwright-report/
        retention-days: 30
